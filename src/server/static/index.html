<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>netascan — Security Audit Report</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 520px;
            width: 100%;
            padding: 2rem;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #f8fafc;
        }
        p {
            color: #94a3b8;
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }
        form {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 0.75rem;
            padding: 1.5rem;
        }
        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: #cbd5e1;
        }
        input[type="file"] {
            width: 100%;
            padding: 0.75rem;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 0.5rem;
            color: #e2e8f0;
            cursor: pointer;
        }
        input[type="file"]::file-selector-button {
            padding: 0.5rem 1rem;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 0.375rem;
            cursor: pointer;
            margin-right: 0.75rem;
        }
        input[type="file"]::file-selector-button:hover {
            background: #2563eb;
        }
        button[type="submit"] {
            width: 100%;
            margin-top: 1rem;
            padding: 0.75rem;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
        }
        button[type="submit"]:hover {
            background: #2563eb;
        }
        .footer {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.75rem;
            color: #475569;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>netascan Report</h1>
        <p>Upload a scan JSON file to generate an interactive security audit report.</p>
        <form method="POST" action="/report" enctype="multipart/form-data">
            <label for="file">Scan file (.json)</label>
            <input type="file" id="file" name="file" accept=".json" required>
            <button type="submit">Generate Report</button>
        </form>
        <div class="footer">netascan v0.2.1 — Net Audit Scanner</div>
    </div>
</body>
</html>
