# OpenSpec Configuration — netascan
# Generated by sdd-init (re-init) — 2026-05-12
# Mode: hybrid (openspec + Engram)

context:
  project: net-audit-scanner
  crate: netascan
  version: 0.1.0
  edition: "2024"
  description: "Network security audit CLI tool"
  license: MIT
  stack:
    primary: Rust (tokio + clap + axum + sqlx/sqlite + pnet + reqwest + tera)
    auxiliary: Python (nmap bridge + shodan check)
  architecture: >-
    Binary crate with lib.rs exposing 8 public modules (scanner, fingerprint,
    cve, security, report, server, cli, config) plus error module. CLI
    frontend dispatches via clap subcommands (scan, report, serve, update).

strict_tdd: true
test_command: cargo test

testing:
  runner:
    command: cargo test
    framework: Rust built-in #[cfg(test)] + assert_cmd for integration
  layers:
    unit:
      available: true
      tool: cargo test (doc-tests + #[cfg(test)] modules)
    integration:
      available: true
      tool: cargo test (tests/ directory with assert_cmd + predicates)
    e2e:
      available: false
      tool: null
  coverage:
    available: false
    command: cargo tarpaulin (opt-in, not configured)
  quality:
    linter:
      available: true
      command: cargo clippy
    type_checker:
      available: true
      command: cargo check (Rust compiler built-in)
    formatter:
      available: true
      command: cargo fmt

phases:
  proposal: "openspec/changes/{change}/proposal.md"
  spec: "openspec/changes/{change}/spec.md"
  design: "openspec/changes/{change}/design.md"
  tasks: "openspec/changes/{change}/tasks.md"
  apply: null
  verify: "openspec/changes/{change}/verify.md"
  archive: "openspec/changes/{change}/archive.md"
